services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  coturn:
    image: coturn/coturn:latest
    network_mode: host
    command:
      - -n
      - --log-file=stdout
      - --listening-port=3478
      - --fingerprint
      - --lt-cred-mech
      - --user=turnuser:turnpassword
      - --realm=connectnow

volumes:
  mongo-data:
