services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  coturn:
    image: coturn/coturn:latest
    network_mode: host
    command:
      - -n
      - --log-file=stdout
      - --listening-port=3478
      - --fingerprint
      - --lt-cred-mech
      - --user=turnuser:turnpassword
      - --realm=connectnow
      - --min-port=49152
      - --max-port=65535
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/meetdb
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access_secret_16}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh_secret_16}
      MEDIASOUP_LISTEN_IP: 0.0.0.0
      MEDIASOUP_ANNOUNCED_IP: ${MEDIASOUP_ANNOUNCED_IP:-127.0.0.1}
      TURN_SERVER_IP: ${TURN_SERVER_IP:-127.0.0.1}
      TURN_USERNAME: turnuser
      TURN_PASSWORD: turnpassword
      FRONTEND_URL: http://localhost:3000
      ADMIN_URL: http://localhost:3001
    depends_on:
      - mongodb
      - redis
    # For production Linux: use network_mode: host for mediasoup UDP
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
    depends_on:
      - backend
    restart: unless-stopped

  admin-panel:
    build:
      context: .
      dockerfile: admin-panel/Dockerfile
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo-data:
